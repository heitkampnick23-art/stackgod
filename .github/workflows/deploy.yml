name: Deploy
# Manual-only. Click 'Run workflow' in GitHub Actions to deploy from CI.
# Day-to-day deploys happen from local via wrangler so this stays dormant.
# To re-enable push-based auto-deploy, add `push: { branches: [main] }` here
# AND set CLOUDFLARE_API_TOKEN as a repo secret with D1+Workers+Pages perms.
on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Deploy Workers
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4d259cf98fff468b0108b6a80b7a10fc
        run: pnpm exec wrangler deploy

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - name: Build + deploy Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4d259cf98fff468b0108b6a80b7a10fc
        run: |
          npx @cloudflare/next-on-pages@latest
          npx wrangler pages deploy .vercel/output/static --project-name=stackgod-web --branch=main
