name = "stackgod-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
account_id = "4d259cf98fff468b0108b6a80b7a10fc"

routes = [
  { pattern = "api.stakgod.com/*", zone_name = "stakgod.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "stackgod"
database_id = "91355169-4ad4-4825-a468-9c830f9dae27"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "stackgod-artifacts"

[[r2_buckets]]
binding = "APPS"
bucket_name = "stackgod-apps"

[[kv_namespaces]]
binding = "SESSIONS"
id = "749eec723bcc4db1892ede8c1a4b401b"

[[queues.producers]]
binding = "BUILD_QUEUE"
queue = "stackgod-builds"

[[queues.consumers]]
queue = "stackgod-builds"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "stackgod-builds-dlq"

[vars]
APP_URL = "https://stakgod.com"
API_URL = "https://api.stakgod.com"

# secrets set via: wrangler secret put NAME
# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# CF_API_TOKEN_REGISTRAR
# APPLE_CLIENT_ID, APPLE_TEAM_ID, APPLE_KEY_ID, APPLE_PRIVATE_KEY
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# RESEND_API_KEY
# SESSION_SECRET
# ENCRYPTION_KEY (base64 32 bytes — AES-GCM at-rest)
# BUILD_TOKEN_SECRET (HMAC for /builds/:id/* one-time tokens)
# GH_PAT (fine-grained PAT with workflows:write on stackgod repo)
# GH_REPO ("heitkampnick23-art/stackgod")
