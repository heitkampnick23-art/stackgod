name = "stackgod-apps"
main = "src/index.ts"
compatibility_date = "2025-01-15"
account_id = "4d259cf98fff468b0108b6a80b7a10fc"

# Serves user-built apps at apps.stakgod.com/{slug}/...
routes = [
  { pattern = "apps.stakgod.com/*", zone_name = "stakgod.com" }
]

[[r2_buckets]]
binding = "APPS"
bucket_name = "stackgod-apps"

[[kv_namespaces]]
binding = "APP_DATA"
id = "69d61efe60e149cbad76e7acc25970fa"

[[kv_namespaces]]
binding = "APP_HOSTS"
id = "c38c6cef8be149e6b99088570dee838d"

[[d1_databases]]
binding = "DB"
database_name = "stackgod"
database_id = "91355169-4ad4-4825-a468-9c830f9dae27"

[ai]
binding = "AI"

# secrets set via wrangler secret put NAME
# ANTHROPIC_API_KEY  (sg.ai)
# RESEND_API_KEY     (sg.auth magic links)
# STRIPE_SECRET_KEY  (sg.payments via Connect account of the app's owner)
[vars]
APP_URL = "https://stakgod.com"
APPS_HOST = "apps.stakgod.com"

# Fires every minute to run due cron tasks (sg.cron). ~1440 invocations/day total.
[triggers]
crons = ["* * * * *"]
